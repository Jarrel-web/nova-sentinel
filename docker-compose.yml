services:
  backend:
    build:
      context: ./backend
      dockerfile: app/Dockerfile
    container_name: nova-sentinel-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: http://localhost:8000
    container_name: nova-sentinel-frontend
    depends_on:
      - backend
    ports:
      - "8080:8080"
    restart: unless-stopped
